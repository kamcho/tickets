{% extends 'core/base.html' %}

{% block title %}Agent Login - Metrolinks Support{% endblock %}

{% block content %}
<div class="login-wrapper" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="max-width: 450px; width: 100%;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🔑</div>
            <h1 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem;">Agent Login</h1>
            <p style="color: var(--text-secondary); font-size: 0.9rem;">Sign in to Metrolinks Solution Support Portal</p>
        </div>

        <form method="post" id="login-form-element">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_username" class="form-label">Email Address</label>
                <input
                    type="email"
                    name="username"
                    id="id_username"
                    class="form-input"
                    placeholder="name@metrolinks.co.ke"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label for="id_password" class="form-label">Password</label>
                <input
                    type="password"
                    name="password"
                    id="id_password"
                    class="form-input"
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="btn btn-primary" id="btn-submit-login" style="width: 100%; padding: 0.8rem; font-size: 1rem;">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
